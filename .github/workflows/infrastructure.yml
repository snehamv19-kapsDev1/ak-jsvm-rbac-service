name: Deploy New Service (CFT changes)

on:
  push:
    branches: [dev, test, main]
    # paths:
    #   - 'cft/**'          # 👈 trigger ONLY if this folder changes
  workflow_dispatch:      # Allows you to manually click "Run workflow" in GitHub UI

env:
  AWS_REGION: us-west-2
  SERVICE_NAME: rbac-authorizer-service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ----------------------
      # CHECKOUT
      # ----------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------
      # SET ENVIRONMENT
      # ----------------------
      - name: Set Environment
        run: |
          case "${GITHUB_REF_NAME}" in
            main) ENV=prod ;;
            test) ENV=test ;;
            dev)  ENV=dev  ;;
            *)
              echo "❌ Invalid branch"
              exit 1
              ;;
          esac
          echo "ENV=$ENV" >> $GITHUB_ENV

      # ----------------------
      # AWS AUTH
      # ----------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------
      # BUILD LAMBDA ZIP
      # ----------------------
      - name: Build lambda zip
        run: |
          mkdir -p build
          cd service
          zip -r ../build/${SERVICE_NAME}.zip . -x "*.git*" "__pycache__/*" "*.pyc"
          cd ..

      # ----------------------
      # GET DATABASE BUCKET
      # ----------------------
      - name: Get Database Bucket
        run: |
          DATABASE_BUCKET=$(aws ssm get-parameter \
            --name "/${ENV}/jsvm/database-bucket-name" \
            --query "Parameter.Value" \
            --output text)

          [ -z "$DATABASE_BUCKET" ] && echo "❌ Missing DB bucket" && exit 1

          echo "DATABASE_BUCKET=$DATABASE_BUCKET" >> $GITHUB_ENV

      # ----------------------
      # INIT DATA FILE
      # ----------------------
      - name: Initialize doctors.json
        run: |
          DATABASE_KEY="${ENV}"
          echo "DATABASE_KEY=${DATABASE_KEY}" >> $GITHUB_ENV

          if ! aws s3api head-object \
            --bucket $DATABASE_BUCKET \
            --key "$DATABASE_KEY/doctors.json" 2>/dev/null; then

            echo "[]" > doctors.json

            aws s3 cp doctors.json \
              s3://$DATABASE_BUCKET/$DATABASE_KEY/doctors.json \
              --content-type application/json
          fi

      # ----------------------
      # GET CODE BUCKET
      # ----------------------
      - name: Get Code Bucket
        run: |
          CODE_BUCKET=$(aws ssm get-parameter \
            --name "/${ENV}/jsvm/code-bucket-name" \
            --query "Parameter.Value" \
            --output text)

          [ -z "$CODE_BUCKET" ] && echo "❌ Missing code bucket" && exit 1

          echo "CODE_BUCKET=$CODE_BUCKET" >> $GITHUB_ENV

      # ----------------------
      # GET RBAC BUCKET
      # ----------------------
      - name: Get RBAC Bucket
        run: |
          RBAC_BUCKET=$(aws ssm get-parameter \
            --name "/${ENV}/jsvm/rbac-bucket-name" \
            --query "Parameter.Value" \
            --output text)

          [ -z "$RBAC_BUCKET" ] && echo "❌ Missing RBAC bucket" && exit 1

          RBAC_BUCKET_URL=$(aws ssm get-parameter \
            --name "/${ENV}/jsvm/rbac-bucket-url" \
            --query "Parameter.Value" \
            --output text)

          echo "RBAC_BUCKET=$RBAC_BUCKET" >> $GITHUB_ENV
          echo "RBAC_BUCKET_URL=$RBAC_BUCKET_URL" >> $GITHUB_ENV

      # ----------------------
      # UPLOAD ZIP TO S3
      # ----------------------
      - name: Upload Lambda Zip
        run: |
          CODE_KEY="${ENV}/${SERVICE_NAME}.zip"

          aws s3 cp build/${SERVICE_NAME}.zip \
            s3://$CODE_BUCKET/$CODE_KEY

          echo "CODE_KEY=$CODE_KEY" >> $GITHUB_ENV

      # ----------------------
      # PRINT PARAMETERS
      # ----------------------
      - name: Print Parameters
        run: |
          echo "ServiceName=${SERVICE_NAME}"
          echo "Environment=${ENV}"
          echo "CodeBucket=${CODE_BUCKET}"
          echo "CodeKey=${CODE_KEY}"
          echo "DatabaseBucket=${DATABASE_BUCKET}"
          echo "DatabaseKey=${DATABASE_KEY}"
          echo "RBACBucket=${RBAC_BUCKET}"
          echo "RBACBucketUrl=${RBAC_BUCKET_URL}"
  

      # ----------------------
      # DEPLOY CLOUDFORMATION (ONLY IF INFRA CHANGED)
      # ----------------------
      - name: Deploy Stack
        run: |
          STACK_NAME="${ENV}-jsvm-${SERVICE_NAME}"

          aws cloudformation deploy \
            --template-file cft/cft-doctor-service-infra.yaml \
            --stack-name $STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ServiceName=${SERVICE_NAME} \
              Environment=${ENV} \
              CodeBucket=${CODE_BUCKET} \
              CodeKey=${CODE_KEY} \
              DatabaseBucket=${DATABASE_BUCKET} \
              DatabaseKey=${DATABASE_KEY} \
              RBACBucket=${RBAC_BUCKET} \
              RBACBucketUrl=${RBAC_BUCKET_URL}

          echo " Infra deployed"

      # ----------------------
      # OUTPUT API URL
      # ----------------------
      - name: Output API URL
        run: |
          STACK_NAME="${ENV}-jsvm-${SERVICE_NAME}"

          API_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          echo "API_URL=$API_URL" >> $GITHUB_ENV
          echo "API URL: $API_URL"

      # ----------------------
      # GENERATE CONFIG JSON
      # ----------------------
      - name: Generate backend config JSON
        run: |
          mkdir -p config
      
          CONFIG_FILE="config/backendApis.json"
      
          cat > "$CONFIG_FILE" <<EOF
          {
            "environment": "${ENV}",
            "services": {
              "${SERVICE_NAME}": {
                "baseUrl": "${API_URL}"
              }
            }
          }
          EOF
      
          echo "Generated config:"
          cat "$CONFIG_FILE"

      # ----------------------
      # GET CONFIG BUCKET
      # ----------------------
      - name: Get Config Bucket
        run: |
          CONFIG_BUCKET=$(aws ssm get-parameter \
            --name "/${ENV}/jsvm/configuration-bucket-name" \
            --query "Parameter.Value" \
            --output text)
      
          [ -z "$CONFIG_BUCKET" ] && echo "❌ Missing config bucket" && exit 1
      
          echo "CONFIG_BUCKET=$CONFIG_BUCKET" >> $GITHUB_ENV

      # ----------------------
      # UPLOAD CONFIG TO S3
      # ----------------------
      - name: Upload config to S3
        run: |
          CONFIG_KEY="${ENV}/backendApis.json"
      
          aws s3 cp config/backendApis.json \
            s3://$CONFIG_BUCKET/$CONFIG_KEY \
            --content-type application/json
      
          echo "CONFIG_KEY=$CONFIG_KEY" >> $GITHUB_ENV      

      # ----------------------
      # SUMMARY
      # ----------------------
      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** $SERVICE_NAME" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $ENV" >> $GITHUB_STEP_SUMMARY
          echo "**API URL:** $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Config File:** s3://$CONFIG_BUCKET/$ENV/backendApis.json" >> $GITHUB_STEP_SUMMARY
